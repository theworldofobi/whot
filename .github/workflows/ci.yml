name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libboost-system-dev \
            libsqlite3-dev \
            nlohmann-json3-dev \
            libwebsocketpp-dev

      - name: Configure
        run: |
          mkdir -p build
          cd build
          cmake .. -DCMAKE_BUILD_TYPE=Release -DBUILD_TESTS=ON

      - name: Build
        run: |
          cd build
          cmake --build . --config Release -j$(nproc)

      - name: Test
        run: |
          cd build
          ctest --output-on-failure

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t whot-local .

      - name: Run container and verify health
        run: |
          set -e
          docker run -d --name whot-ci -e PORT=8080 -p 8080:8080 whot-local
          for i in $(seq 1 60); do
            if curl -fsS --max-time 2 http://127.0.0.1:8080/api/health >/dev/null 2>&1; then
              echo "Health check OK (attempt $i)"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed after retries"
          docker logs whot-ci || true
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f whot-ci 2>/dev/null || true
