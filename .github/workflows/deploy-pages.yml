name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Configure frontend runtime endpoints
        env:
          WHOT_API_BASE: ${{ vars.WHOT_API_BASE }}
          WHOT_WS_URL: ${{ vars.WHOT_WS_URL }}
        run: |
          API_BASE="${WHOT_API_BASE:-https://whot-production.up.railway.app}"
          WS_URL="${WHOT_WS_URL:-wss://whot-production.up.railway.app/ws}"
          cat > web/js/runtime-config.js <<EOF
          window.WHOT_CONFIG = {
            apiBase: "${API_BASE}",
            wsUrl: "${WS_URL}"
          };
          EOF
      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
